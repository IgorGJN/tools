<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minhas Ferramentas</title>

  <style>
    :root {
      --bg: #0b1020;
      --card: rgba(17, 23, 42, 0.78);
      --text: #edf2ff;
      --muted: #9aa6c7;
      --border: rgba(255,255,255,0.08);
      --primary: #6d8cff;
      --primary2: #8b5cf6;
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(109,140,255,0.2), transparent),
        linear-gradient(180deg, var(--bg), #080c18);
      min-height: 100vh;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 30px 16px;
    }

    h1 {
      margin: 0;
      font-size: 34px;
    }

    .sub {
      margin-top: 10px;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 18px;
      margin-top: 30px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      transition: 0.2s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(109,140,255,0.4);
    }

    .icon {
      font-size: 26px;
      margin-bottom: 10px;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
    }

    .desc {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
    }

    .footer {
      margin-top: 40px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>

<body>
  <div class="container">

    <h1>Minhas Ferramentas</h1>
    <div class="sub">Central com acesso rápido às ferramentas que você criou.</div>

    <div class="grid">

      <!-- TOOL 1 -->
      <a href="sports.html" class="card">
        <div class="icon">🏃</div>
        <div class="title">Caixinha de Atividades</div>
        <div class="desc">
          Controle de corridas, pedais e despesas com saldo automático.
        </div>
      </a>
      <!-- TOOL 2 -->
      <a href="task/index.html" class="card">
        <div class="icon">✔️</div>
        <div class="title">Tarefas</div>
        <div class="desc">
          Atividades do dia a dia. 
        </div>
      </a>

      <!-- NOVAS FERRAMENTAS FUTURAS -->
      <!--
      <a href="financeiro.html" class="card">
        <div class="icon">💰</div>
        <div class="title">Financeiro</div>
        <div class="desc">Descrição...</div>
      </a>
      -->

    </div>

    <div class="footer">
      Criado para uso próprio • Layout padrão para novas ferramentas
    </div>

  </div>
</body>
</html>
